<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h5 class="text-center mb-4">🍔 Admin</h5>

        <a href="#" class="activo"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="#"><i class="fa-solid fa-burger"></i> Productos</a>
        <a href="#"><i class="fa-solid fa-tags"></i> Categorías</a>
        <a href="#"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>

    </div>

    <!-- MAIN -->

    <div class="main">

        <h2 class="mb-4">Dashboard</h2>

        <!-- estadísticas -->

        <div class="row mb-4">

            <div class="col-md-3">
                <div class="dashboard-card">
                    <i class="fa-solid fa-utensils"></i>
                    <h4 id="totalProductos">0</h4>
                    <p>Productos</p>
                </div>
            </div>

            <!-- <div class="col-md-3">
                <div class="dashboard-card">
                    <i class="fa-solid fa-eye"></i>
                    <h4>0</h4>
                    <p>Vistas hoy</p>
                </div>
            </div> -->

            <div class="col-md-3">
                <div class="dashboard-card">
                    <i class="fa-solid fa-tags"></i>
                    <h4 id="totalCategorias">0</h4>
                    <p>Categorías</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="dashboard-card">
                    <i class="fa-solid fa-check"></i>
                    <h4 id="productosActivos">0</h4>
                    <p>Activos</p>
                </div>
            </div>

        </div>

        <!-- tabla -->

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h4>Productos</h4>

            <div class="d-flex gap-2">

                <input class="form-control" id="buscarProducto" placeholder="Buscar producto">

                <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#modalProducto">

                    <i class="fa-solid fa-plus"></i> Nuevo

                </button>

            </div>

        </div>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Imagen</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Categoría</th>
                        <th>Activo</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaProductos">
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL Nuevo Producto -->
    <div class="modal fade" id="modalProducto">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5><i class="fa-solid fa-burger"></i> Producto</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="formProducto">
                        <img id="previewImagen" class="preview-img">
                        <input type="file" id="imagen" class="form-control mb-3">

                        <label>Nombre</label>
                        <input class="form-control mb-3" id="nombre">

                        <label>Descripción</label>
                        <textarea class="form-control mb-3" id="descripcion"></textarea>

                        <label>Precio</label>
                        <input class="form-control mb-3" type="number" id="precio">

                        <label>Categoría</label>
                        <input class="form-control mb-3" id="categoria">

                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="activo" checked>
                            <label class="form-check-label">Producto disponible</label>
                        </div>

                        <button class="btn btn-warning w-100">
                            <i class="fa-solid fa-floppy-disk"></i>
                            Guardar producto
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL Editar Producto -->
    <div class="modal fade" id="modalEditarProducto">

        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5><i class="fa-solid fa-burger"></i>Editar Producto</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <img id="previewImagenEditar" class="preview-img">

                    <input type="file" id="imagenEditar" class="form-control mb-3">

                    <label>Nombre</label>
                    <input class="form-control mb-3" id="nombreEditar">

                    <label>Descripción</label>
                    <textarea class="form-control mb-3" id="descripcionEditar"></textarea>

                    <label>Precio</label>
                    <input class="form-control mb-3" type="number" id="precioEditar">

                    <label>Categoría</label>
                    <input class="form-control mb-3" id="categoriaEditar">

                    <div class="form-check form-switch mb-3">

                        <input class="form-check-input" type="checkbox" id="activoEditar" checked>

                        <label class="form-check-label">Producto disponible</label>

                    </div>

                    <button class="btn btn-warning w-100" id="btnGuardarEditar">
                        <i class="fa-solid fa-floppy-disk"></i>
                        Guardar producto
                    </button>

                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        $("#imagen").on("change", function (e) {

            const file = e.target.files[0]
            if (file) {
                const reader = new FileReader()
                reader.onload = function (ev) {
                    $("#previewImagen").attr("src", ev.target.result)
                }
                reader.readAsDataURL(file)
            }
        })

    </script>

    <script src="js/admin.js"></script>

</body>

</html>
