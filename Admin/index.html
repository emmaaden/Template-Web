<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin</title>
    
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <div class="container py-5">
        <h2>Administrador de menú</h2>
        <button class="btn btn-warning mb-3" data-bs-toggle="modal" data-bs-target="#modalProducto">
            Nuevo Producto
        </button>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Categoría</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaProductos">
            </tbody>
        </table>
    </div>

    <div class="modal fade" id="modalProducto">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5>Producto</h5>
                </div>
                <div class="modal-body">
                    <form id="formProducto">
                        <input class="form-control mb-2" id="nombre" placeholder="Nombre">
                        <textarea class="form-control mb-2" id="descripcion"></textarea>
                        <input class="form-control mb-2" id="precio" type="number">
                        <input class="form-control mb-2" id="categoria" placeholder="Categoría">
                        <input class="form-control mb-2" id="imagen" type="file" placeholder="URL Imagen">
                        <button class="btn btn-warning w-100">
                            Guardar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/admin.js"></script>
    
</body>

</html>
