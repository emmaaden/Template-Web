<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Login Administrador</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .login-container {

            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;

        }

        .login-card {

            background: #1e293b;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);

        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h3 class="text-center mb-4">
                <i class="fa-solid fa-user-lock"></i>
                Admin Login
            </h3>

            <form id="loginForm">
                <input type="email" class="form-control mb-3" id="email" placeholder="Correo" required>
                <input type="password" class="form-control mb-3" id="password" placeholder="Contraseña" required>
                <button class="btn btn-warning w-100">
                    Ingresar
                </button>
            </form>
            <div id="error" class="text-danger mt-3 text-center"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/login.js"></script>

</body>

</html>
